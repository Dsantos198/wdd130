<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco | Corredeiras Rafting - Contato e Suporte</title>

    <meta name="description" content="Entre em contato com a Corredeiras Rafting para dúvidas, reservas e suporte.">
    <meta name="author" content="Davi Victor">
<link rel="stylesheet" href="estilos/rafting.css">

</head>

<body>

<header>
    <img src="imagens/logo.png" alt="Logo Corredeiras Rafting">

    <nav>
        <ul class="grid">
            <li><a href="index.html">Página Inicial</a></li>
            <li><a href="sobre.html">Sobre Nós</a></li>
            <li><a href="passeios.html">Passeios</a></li>
            <li><a href="contato.html">Fale Conosco</a></li>
        </ul>
    </nav>
</header>

<main>

<section class="contato">

    <h1>Fale Conosco - Corredeiras Rafting</h1>

    <div class="info">
        <p>123 Rua Principal do Rio</p>
        <p>Foz do Iguaçu, Paraná</p>
        <p>+55 45 99999-9999</p>
        <p>info@corredeiras.com</p>
    </div>

    <div class="contato-container">

        <!-- MAPA -->
        <div class="mapa">
            <iframe 
                src="https://www.google.com/maps?q=Foz+do+Iguaçu&output=embed"
                loading="lazy">
            </iframe>
        </div>

        <!-- FORM -->
        <form>

    <label for="nome">Nome</label>
    <input type="text" id="nome" name="nome" required>

    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" required>

    <fieldset>
        <legend>Propósito da Mensagem</legend>

        <input type="radio" id="duvida" name="assunto" value="duvida" required>
        <label for="duvida">Dúvida Geral</label>

        <input type="radio" id="reserva" name="assunto" value="reserva">
        <label for="reserva">Pergunta sobre Reserva</label>

        <input type="radio" id="sugestao" name="assunto" value="sugestao">
        <label for="sugestao">Sugestão</label>

    </fieldset>

    <label for="mensagem">Mensagem</label>
    <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

    <input type="checkbox" id="newsletter" name="newsletter">
    <label for="newsletter">Quero receber a newsletter mensal</label>

    <button type="submit">Enviar Mensagem</button>

</form>

    </div>

</section>

<section class="funcionarios">
    <h2>Estamos Aqui para Servi-lo</h2>

    <div class="cards">
        <figure>
            <img src="imagens/guia-acompanhado.jpg" alt="Guia de rafting">
            <figcaption>Guia de Rafting</figcaption>
        </figure>

        <figure>
            <img src="imagens/instrutor.jpg" alt="Instrutor de segurança">
            <figcaption>Instrutor de Segurança</figcaption>
        </figure>

        <figure>
            <img src="imagens/passeio.jpg" alt="Equipe de rafting">
            <figcaption>Equipe de Operações</figcaption>
        </figure>
    </div>
</section>

</main>

<footer>
    <p>© 2026 Corredeiras Rafting | Davi Victor</p>

    <nav class="redes-sociais">
        <a href="https://www.facebook.com/" target="_blank">
            <img src="imagens/facebook.png" alt="Facebook">
        </a>

        <a href="https://www.linkedin.com/" target="_blank">
            <img src="imagens/linkedin.png" alt="LinkedIn">
        </a>

        <a href="https://www.instagram.com/" target="_blank">
            <img src="imagens/instagram.png" alt="Instagram">
        </a>
    </nav>
</footer>

</body>
</html>
