<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Corredeiras Rafting</title>
    <link rel="stylesheet" href="estilos/contato.css">
</head>

<body>

<header>
    <img src="imagens/logo.png" alt="Logo">

    <nav>
        <ul class="grid">
            <li><a href="index.html">Página Inicial</a></li>
            <li><a href="sobre.html">Sobre Nós</a></li>
            <li><a href="passeios.html">Viagens</a></li>
            <li><a href="contato.html">Fale Conosco</a></li>
        </ul>
    </nav>
</header>

<main>

<section class="contato">

    <h1>Companhia de Rafting em Corredeiras</h1>

    <div class="info">
        <p>123 Rua Principal do Rio</p>
        <p>Foz do Iguaçu, Paraná</p>
        <p>+55 45 99999-9999</p>
        <p>info@corredeiras.com</p>
    </div>

    <div class="contato-container">

        <!-- MAPA -->
        <div class="mapa">
            <iframe 
                src="https://www.google.com/maps?q=Foz+do+Iguaçu&output=embed"
                style="border:0;" 
                loading="lazy">
            </iframe>
        </div>

        <!-- FORM -->
        <form>
            <h2>Envie sua mensagem</h2>

            <label>Nome</label>
            <input type="text" placeholder="Digite aqui">

            <label>Email</label>
            <input type="email" placeholder="Digite aqui">

            <label>Propósito da Mensagem</label>

            <label><input type="radio" name="tipo"> Dúvida Geral</label>
            <label><input type="radio" name="tipo"> Pergunta sobre Reserva</label>
            <label><input type="radio" name="tipo"> Sugestão</label>

            <label>Mensagem</label>
            <textarea rows="4" placeholder="Digite aqui"></textarea>

            <label>
                <input type="checkbox">
                Por favor, me inscreva na newsletter mensal
            </label>

            <button>Entrar em Contato</button>
        </form>

    </div>

</section>

<!-- FUNCIONÁRIOS -->
<section class="funcionarios">

    <h2>Estamos Aqui para Servi-lo</h2>

    <div class="cards">
        <figure>
            <img src="imagens/funcionario1.jpg">
            <figcaption>Perfil do Funcionário</figcaption>
        </figure>

        <figure>
            <img src="imagens/funcionario2.jpg">
            <figcaption>Perfil do Funcionário</figcaption>
        </figure>

        <figure>
            <img src="imagens/funcionario3.jpg">
            <figcaption>Perfil do Funcionário</figcaption>
        </figure>
    </div>

</section>

</main>

<footer>
    <p>© 2026 corredeiras rafting</p>

    <div class="socialmedia">
        <img src="imagens/facebook.png">
        <img src="imagens/linkedin.png">
        <img src="imagens/instagram.png">
    </div>
</footer>

</body>
</html>
