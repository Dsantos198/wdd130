<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fale Conosco | Corredeiras Rafting</title>

    <meta name="description" content="Entre em contato com a Corredeiras Rafting para dúvidas, reservas e suporte técnico.">
    <meta name="author" content="Davi Victor">

    <link rel="stylesheet" href="estilos/rafting01.css">
</head>

<body>

<header>
    <img src="imagens/logo.png" alt="Logo da empresa Corredeiras Rafting">

    <nav>
        <ul class="grid">
            <li><a href="index.html">Página Inicial</a></li>
            <li><a href="sobre.html">Sobre Nós</a></li>
            <li><a href="passeios.html">Passeios</a></li>
            <li><a href="contato.html">Fale Conosco</a></li>
        </ul>
    </nav>
</header>

<main>

<section class="contato">

    <h1>Corredeiras Rafting</h1>

    <div class="info">
        <p>123 Rua Principal do Rio</p>
        <p>Foz do Iguaçu, Paraná</p>
        <p>+55 45 99999-9999</p>
        <p>info@corredeiras.com</p>
    </div>

    <div class="contato-container">

        <!-- ✅ MAPA CORRIGIDO -->
        <div class="mapa">
            <iframe 
                src="https://www.google.com/maps?q=Foz+do+Iguaçu&output=embed"
                loading="lazy">
            </iframe>
        </div>

        <!-- FORM -->
        <form>

            <h2>Envie sua mensagem</h2>

            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome">

            <label for="email">Email</label>
            <input type="email" id="email" name="email">

            <p>Propósito da Mensagem</p>

            <!-- ✅ RADIO CORRETO -->
            <label>
                <input type="radio" name="tipo" value="geral">
                Dúvida Geral
            </label>

            <label>
                <input type="radio" name="tipo" value="reserva">
                Pergunta sobre Reserva
            </label>

            <label>
                <input type="radio" name="tipo" value="sugestao">
                Sugestão
            </label>

            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" name="mensagem"></textarea>

            <!-- ✅ CHECKBOX CORRETO -->
            <label>
                <input type="checkbox" id="newsletter" name="newsletter">
                Quero receber a newsletter mensal
            </label>

            <button type="submit">Entrar em Contato</button>

        </form>

    </div>

</section>

<section class="funcionarios">

    <h2>Estamos Aqui para Servi-lo</h2>

    <div class="cards">

        <figure>
            <img src="imagens/guia-acompanhado.jpg" alt="Guia de rafting acompanhando grupo no rio">
            <figcaption>Guia de Rafting</figcaption>
        </figure>

        <figure>
            <img src="imagens/instrutor.jpg" alt="Instrutor de segurança em atividade de rafting">
            <figcaption>Instrutor de Segurança</figcaption>
        </figure>

        <figure>
            <img src="imagens/passeio.jpg" alt="Equipe de rafting preparada para passeio no rio">
            <figcaption>Equipe de Operações</figcaption>
        </figure>

    </div>

</section>

</main>

<footer>
    <p>© 2026 Corredeiras Rafting | Davi Victor</p>

    <nav class="redes-sociais">
        <a href="https://www.facebook.com/" target="_blank">
            <img src="imagens/facebook.png" alt="Ícone do Facebook">
        </a>

        <a href="https://www.linkedin.com/" target="_blank">
            <img src="imagens/linkedin.png" alt="Ícone do LinkedIn">
        </a>

        <a href="https://www.instagram.com/" target="_blank">
            <img src="imagens/instagram.png" alt="Ícone do Instagram">
        </a>
    </nav>
</footer>

</body>
</html>
