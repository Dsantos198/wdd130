<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tabela</title>
    <link rel="stylesheet" href="estilos/tabela.css">

</head>
<body>

<table>
    <thead>
        <tr>
            <th>Liga</th>
            <th>Time</th>
            <th>Retrospecto (vitórias-derrotas)</th>
            <th>Número de jogadores</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td rowspan="2">Sul</td>
            <td>Paraná</td>
            <td>52-19</td>
            <td>23</td>
        </tr>
        <tr>
            <td>Santa Catarina</td>
            <td>49-24</td>
            <td>10</td>
        </tr>

        <tr>
            <td rowspan="3">Oeste</td>
            <td>Lacerda</td>
            <td>92-70</td>
            <td>27</td>
        </tr>
        <tr>
            <td>Acre</td>
            <td>75-87</td>
            <td>20</td>
        </tr>
        <tr>
            <td>Rondônia</td>
            <td>10-7</td>
            <td>12</td>
        </tr>
    </tbody>

    <tfoot>
        <tr>
            <th colspan="3">Total de jogadores</th>
            <th>92</th>
        </tr>
    </tfoot>
</table>

</body>
</html>
