<doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Pesquisa</title>

<h1>WDD 130 | Formulário HTML – Pesquisa de Usuário</h1>

<form>

<link rel="stylesheet" href="estilos/formulario-pesquisa.css">

  <fieldset>
    <legend>Informações de Contato</legend>

    <div class="item-formulario">
      <label for="nome">Nome Completo:</label>
      <input type="text" id="nome">
    </div>

    <div class="item-formulario">
      <label for="email">E-mail:</label>
      <input type="email" id="email">
    </div>

  </fieldset>

  <fieldset>
    <legend>Perguntas</legend>

    <div class="item-formulario">
      <label for="browser">Qual é o seu navegador favorito?</label>
      <select id="browser">
        <option>Chrome</option>
        <option>Firefox</option>
        <option>Edge</option>
        <option>Safari</option>
        <option>Opera</option>
        <option>Brave</option>
        <option>Outro</option>
      </select>
    </div>

    <div class="item-formulario">
      <label for="pet">Você tem animal de estimação?</label>
      <input type="checkbox" id="pet">
    </div>

    <div class="item-formulario">
      <label for="lugares">Liste os lugares onde você morou:</label>
      <textarea placeholder="Stillwater Florida, Amsterdam Netherlands, Tibuktu Mali"></textarea>
    </div>

  </fieldset>

  <button type="submit">Enviar Pesquisa</button>

</form>
